<!doctype html>
<html>
<head>
    <title>Chat App</title>
</head>
<body>

<h1>💬 Chat App</h1>

<form method="POST" action="/send">
    <input name="username" placeholder="Name" required>
    <input name="message" placeholder="Message" required>
    <button type="submit">Send</button>
</form>

<hr>

{% for m in messages %}
<p>{{ m }}</p>
{% endfor %}

</body>
</html>
